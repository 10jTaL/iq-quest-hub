services:
  quizzbackend:
    build: .
    container_name: quizzbackend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SSL_KEY_PATH=/certs/key.pem
      - SSL_CERT_PATH=/certs/cert.pem
    volumes:
      - /home/test/certs:/certs:ro
    networks:
      - iqnet

networks:
  iqnet: {}