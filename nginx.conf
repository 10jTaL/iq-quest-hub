server {
    listen 8085 ssl;
    server_name atl-svap21.cipeliagroup.com;

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    root  /usr/share/nginx/html;
    index index.html;

    # Support React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy → Backend Express
    location /api/ {
        proxy_pass         http://quizzbackend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy → ADFS
    location /adfs/ {
        proxy_pass       https://adfs.cipeliagroup.com/adfs/;
        proxy_ssl_verify off;
        proxy_set_header Host adfs.cipeliagroup.com;
    }
}