server {
    listen 8085 ssl;
    server_name atl-svap21.cipeliagroup.com;

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    # ↓ DNS interne Docker — résolution à la volée, pas au démarrage
    resolver 127.0.0.11 valid=30s;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend http://quizzbackend:3000;  # variable = résolution runtime
        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /adfs/ {
        set $adfs https://adfs.cipeliagroup.com;  # variable = résolution runtime
        proxy_pass       $adfs/adfs/;
        proxy_ssl_verify off;
        proxy_set_header Host adfs.cipeliagroup.com;
    }
}